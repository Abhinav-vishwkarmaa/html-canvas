version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: templatecraft_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: templatecraft
      MYSQL_USER: tc_user
      MYSQL_PASSWORD: tc_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
