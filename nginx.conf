# Nginx Production Configuration for TemplateCraft
# Copy this file to /etc/nginx/sites-available/templatecraft
# Then link it: sudo ln -s /etc/nginx/sites-available/templatecraft /etc/nginx/sites-enabled/
# Verify config: sudo nginx -t
# Reload nginx: sudo systemctl restart nginx

# -------------------------------------------------------------
# 1. Rate Limiting Zones (Place inside http { ... } in main nginx.conf if needed,
# or keep here if Nginx allows it inside server block directory loads).
# Note: limit_req_zone must be defined at the http level.
# If Nginx fails to start, move these 3 lines to /etc/nginx/nginx.conf inside http block.
# -------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=general_api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=otp_send_limit:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=flow_transition_limit:10m rate=10r/m;
limit_req_status 429;

# -------------------------------------------------------------
# 2. Cache Path definition for Nginx Micro-caching (http level)
# -------------------------------------------------------------
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=flow_cache:10m max_size=1g inactive=60m use_temp_path=off;

server {
    listen 80;
    # Replace with your actual domain name or server IP address
    server_name localhost;

    # -------------------------------------------------------------
    # 3. Serve Frontend Static Assets Directly
    # -------------------------------------------------------------
    # Points directly to frontend build dist directory.
    # This completely bypasses the PM2 'serve' node process, freeing up RAM/CPU.
    root /var/www/templatecraft/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (JS, CSS, images) heavily at browser level
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # -------------------------------------------------------------
    # 4. Proxy /api/flow/page with 5-Second Micro-caching
    # -------------------------------------------------------------
    # Caches routing queries to eliminate duplicate NestJS/DB lookups.
    location /api/flow/page {
        proxy_cache flow_cache;
        proxy_cache_valid 200 5s;
        proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
        proxy_cache_key "$request_uri";

        proxy_pass http://127.0.0.1:3000/api/flow/page;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;

        # Header to easily debug caching in browser DevTools
        add_header X-Cache-Status $upstream_cache_status;
    }

    # -------------------------------------------------------------
    # 5. Rate Limit OTP Dispatches (Max 3 OTP sends per minute per IP)
    # -------------------------------------------------------------
    location /api/otp/send {
        limit_req zone=otp_send_limit burst=3 nodelay;

        proxy_pass http://127.0.0.1:3000/api/otp/send;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
    }

    # -------------------------------------------------------------
    # 6. Rate Limit Flow Transitions (Max 10 clicks/conversions per minute per IP)
    # -------------------------------------------------------------
    location /api/flow/transition {
        limit_req zone=flow_transition_limit burst=5 nodelay;

        proxy_pass http://127.0.0.1:3000/api/flow/transition;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
    }

    # -------------------------------------------------------------
    # 7. General API proxying
    # -------------------------------------------------------------
    location /api/ {
        limit_req zone=general_api_limit burst=20 nodelay;

        # Maps to NestJS running via PM2 on port 3000
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
